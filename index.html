<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>introduction website</title>
    <link rel="stylesheet" href="style.css">
    <link href="java.js" rel="stylesheet">
</head>
<body>

    <main class="container">
        <section class="profile-card">
            <div class="image-container">
                <img src="images/self picture.jpg" alt="Kalyakorn Panthong" class="profile-img">
            </div>
            <h1>Kalyakorn Panthong</h1>
            <div class="status-badge">
                <img src="images/Python-logo.png" alt="Python Logo" class="mini-logo">
                <span>Junior Developer</span>
            </div>
        </section>

        <section class="info-grid">
            <div class="card">
                <h3>School</h3>
                <a href="https://www.plookpanya.ac.th/en/" target="_blank"><img src="images/school logo.jpg" alt="Plookpanya Logo" class="school-logo"></a>
                <p><strong>Plookpanya High School</strong></p>
                <p>Grade 10</p>
            </div>

            <div class="card">
                <h3>Hobbies</h3>
                <ul>
                    <li>🎨 Digital Art</li>
                    <li>💻 Coding every Saturday</li>
                </ul>
            </div>

            <div class="card">
                <h3>Projects</h3>
                <p class="muted">None</p>
            </div>
        </section>
        
        <!-- DinoS!!! YAY!! -->
        <section class="dinos">
            <div class="dino-container">
                <img src="images/petro.png" alt="flying reptile" class="dino-petro">
                <img src="images/tapejara.png" alt="big flying reptile" class="dino-tarpy">
                
                <img id="spino" src="images/spino.png" 
                    alt="spinosaurus" 
                    class="dino-spino"
                    onclick="run()">
                <!-- <img id="comsypack" src="images/comsy.png" alt="compsognathus" class="dino-comsy"> -->
                <img id="comsypack" 
                    src="images/comsy.png" 
                    
                    alt="compsognathus" 
                    class="dino-comsy" 
                    onclick="startDinoRain(), startDinoRise()">
                    <!-- onclick="startDinoRise()"> -->
                <!-- onclick="duplicateimage()"> -->
                
                <!-- <img id="clicksnake" src="images/bigsnake.png" alt="titanoboa" class="dino-snake"
                onclick="document.getElementById('clicksnake');src='images/bigsnakehissing.png'"
                > -->
                <img id="clicksnake" 
                    src="images/bigsnake.png" 
                    alt="titanoboa" 
                    class="dino-snake" 
                    onclick="snakeHiss()">

                <img id="comsypack2" src="images/comsy2.png" alt="comsylego or something" class="dino-lego-comsy">
                
                <!-- <img id="mosy" src="images/mosy.png"
                    alt="mosasaurus" class="dino-water"> -->

                <img id="mosy" 
                    src="images/mosy_swiming.png" 
                    alt="mosasaurus" 
                    class="dino-water" 
                    onclick="swim()">
                <!-- <img src="images/petro.png" alt="peter 2" class="deco-pic"> -->
                <!-- <img src="images/spino.png" alt="spino 2" class="deco-pic"> -->
            </div>
        </section>
        
        <footer>
            <p class="quote">"Face the fear, built no future"</p>
        </footer>
    </main>

    <script src="java.js"></script>
</body>
</html>
